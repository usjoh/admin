<style>

  :root {
    --bg: #000;
    --text: #e0e0e0;
    --text-bright: #ffffff;
    --text-dim: #666;
    --gold: #d4a843;
    --accent: #7eb8d0;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Slideshow container ── */
  .slideshow {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
  }

  /* ── Slide (photo or text card) ── */
  .slide {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 0;
    background: #000;
  }
  .slide.active {
    opacity: 1;
    z-index: 3;
    pointer-events: auto;
  }
  .slide.previous {
    z-index: 2;
  }

  /* Photo slides */
  .slide-photo {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
  }
  .slide-photo {
    transition: transform 8s ease-in-out;
    transform: scale(1.0);
  }
  .slide.active .slide-photo {
    transform: scale(1.04) translate(-0.3%, -0.2%);
  }

  /* Photo caption overlay */
  .slide-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 3rem 2rem 1.5rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    text-align: center;
    z-index: 3;
  }
  .slide-caption .caption-text {
    font-size: 1rem;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.02em;
  }

  /* Text card slides (chapter intros, title, closing) */
  .slide-text {
    text-align: center;
    padding: 2rem;
    max-width: 800px;
  }
  .slide-text h1 {
    font-family: var(--serif);
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    color: var(--text-bright);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 0.5rem;
  }
  .slide-text .subtitle {
    font-family: var(--serif);
    font-size: clamp(1.1rem, 2.5vw, 1.6rem);
    color: var(--gold);
    font-style: italic;
    margin-bottom: 2rem;
  }
  .slide-text .body {
    font-size: clamp(1rem, 1.8vw, 1.2rem);
    line-height: 1.9;
    color: var(--text);
    margin-bottom: 1.5rem;
  }
  .slide-text .stats {
    display: flex;
    justify-content: center;
    gap: 3rem;
    margin-top: 2rem;
  }
  .slide-text .stat-number {
    font-family: var(--serif);
    font-size: 3rem;
    color: var(--text-bright);
    font-weight: 700;
    display: block;
  }
  .slide-text .stat-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  /* Chapter title cards */
  .slide-text .chapter-year {
    font-family: var(--serif);
    font-size: clamp(4rem, 8vw, 7rem);
    color: var(--text-bright);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .slide-text .chapter-title {
    font-family: var(--serif);
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    color: var(--gold);
    font-style: italic;
    margin-bottom: 0.5rem;
  }
  .slide-text .chapter-meta {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 1.5rem;
    letter-spacing: 0.03em;
  }
  .slide-text .chapter-narrative {
    font-size: clamp(1rem, 1.6vw, 1.15rem);
    line-height: 1.9;
    color: var(--text);
    max-width: 650px;
    margin: 0 auto;
  }

  /* Memorial / closing */
  .slide-text .memorial {
    font-family: var(--serif);
    font-size: 2rem;
    color: var(--text-bright);
    margin-bottom: 1.5rem;
  }
  .slide-text .tagline {
    font-family: var(--serif);
    font-size: 1.5rem;
    color: var(--gold);
    font-style: italic;
    margin-top: 2rem;
  }
  .slide-text .credit {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 3rem;
    line-height: 1.6;
  }

  /* ── Controls overlay ── */
  .controls {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 100;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  body:hover .controls,
  .controls.visible {
    opacity: 1;
  }
  .controls button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: var(--sans);
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .controls button:hover {
    background: rgba(255,255,255,0.2);
  }
  .controls .progress {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-family: var(--sans);
  }

  /* ── Start screen ── */
  .start-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 0.8s;
  }
  .start-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .start-screen h1 {
    font-family: var(--serif);
    font-size: 3rem;
    color: var(--text-bright);
    margin-bottom: 0.5rem;
  }
  .start-screen .sub {
    font-family: var(--serif);
    font-size: 1.3rem;
    color: var(--gold);
    font-style: italic;
    margin-bottom: 3rem;
  }
  .start-button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--text-bright);
    font-family: var(--sans);
    font-size: 1.1rem;
    font-weight: 500;
    padding: 1rem 3rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.05em;
  }
  .start-button:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
  }
  .start-hint {
    margin-top: 2rem;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  /* Progress bar */
  .progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--gold);
    z-index: 50;
    transition: width 0.3s ease;
    opacity: 0.6;
  }
</style>
</head>

    </p>

];

// ── Engine ──
const DEFAULT_PHOTO_DURATION = 5000;
const DEFAULT_TEXT_DURATION = 10000;
let current = 0;
let playing = false;
let timer = null;

const slideshow = document.getElementById('slideshow');
const startScreen = document.getElementById('startScreen');
const startBtn = document.getElementById('startBtn');
const playPauseBtn = document.getElementById('playPauseBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressText = document.getElementById('progressText');
const progressBar = document.getElementById('progressBar');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const controls = document.getElementById('controls');

// Build slide DOM elements
slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  div.dataset.index = i;

  if (s.type === 'photo') {
    div.innerHTML = `
      <div class="slide-photo" style="background-image: url('${s.src}')"></div>
      ${s.caption ? `<div class="slide-caption"><span class="caption-text">${s.caption}</span></div>` : ''}
    `;
  } else {
    div.innerHTML = `<div class="slide-text">${s.html}</div>`;
  }

  slideshow.appendChild(div);
});

// Preload next few images
function preload(startIdx) {
  for (let i = startIdx; i < Math.min(startIdx + 5, slides.length); i++) {
    if (slides[i].type === 'photo') {
      const img = new Image();
      img.src = slides[i].src;
    }
  }
}

function showSlide(index) {
  const allSlides = slideshow.querySelectorAll('.slide');

  // Remove previous class from all
  allSlides.forEach(s => s.classList.remove('previous'));

  // The currently active slide becomes previous (for crossfade out)
  const oldActive = slideshow.querySelector('.slide.active');
  if (oldActive && oldActive.dataset.index != index) {
    oldActive.classList.remove('active');
    oldActive.classList.add('previous');
    // Clean up previous after transition
    setTimeout(() => oldActive.classList.remove('previous'), 1400);
  }

  current = index;
  allSlides[current].classList.add('active');

  // Update progress
  progressText.textContent = `${current + 1} / ${slides.length}`;
  progressBar.style.width = `${((current + 1) / slides.length) * 100}%`;

  // Preload upcoming
  preload(current + 1);
}

function nextSlide() {
  if (current < slides.length - 1) {
    showSlide(current + 1);
    scheduleNext();
  } else {
    // End of show — hold on closing, then loop
    timer = setTimeout(() => { showSlide(0); scheduleNext(); }, 15000);
  }
}

function prevSlide() {
  if (current > 0) {
    showSlide(current - 1);
    if (playing) scheduleNext();
  }
}

function scheduleNext() {
  clearTimeout(timer);
  if (!playing) return;
  const s = slides[current];
  const dur = s.duration || (s.type === 'photo' ? DEFAULT_PHOTO_DURATION : DEFAULT_TEXT_DURATION);
  timer = setTimeout(nextSlide, dur);
}

function play() {
  playing = true;
  playPauseBtn.textContent = 'Pause';
  scheduleNext();
  if (bgMusic) bgMusic.play();
}

function pause() {
  playing = false;
  playPauseBtn.textContent = 'Play';
  clearTimeout(timer);
  if (bgMusic) bgMusic.pause();
}

function togglePlay() {
  if (playing) pause(); else play();
}

// ── Event handlers ──
const bgMusic = document.getElementById('bgMusic');
bgMusic.volume = 0.4;

startBtn.addEventListener('click', () => {
  startScreen.classList.add('hidden');
  controls.classList.add('visible');
  showSlide(0);
  play();
  bgMusic.play();
  // Fade controls after 3s
  setTimeout(() => controls.classList.remove('visible'), 3000);
});

playPauseBtn.addEventListener('click', togglePlay);
nextBtn.addEventListener('click', () => { nextSlide(); });
prevBtn.addEventListener('click', () => { prevSlide(); });
const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', () => {
  bgMusic.muted = !bgMusic.muted;
  muteBtn.textContent = bgMusic.muted ? 'Unmute' : 'Mute';
});

fullscreenBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
});

document.addEventListener('keydown', (e) => {
  if (startScreen && !startScreen.classList.contains('hidden')) {
    if (e.key === ' ' || e.key === 'Enter') {
      startBtn.click();
      e.preventDefault();
    }
    return;
  }
  switch(e.key) {
    case ' ':
      togglePlay();
      e.preventDefault();
      break;
    case 'ArrowRight':
    case 'ArrowDown':
      nextSlide();
      break;
    case 'ArrowLeft':
    case 'ArrowUp':
      prevSlide();
      break;
    case 'f':
    case 'F':
      fullscreenBtn.click();
      break;
    case 'm':
    case 'M':
      muteBtn.click();
      break;
  }
});

// Preload first batch
preload(0);
</script>
